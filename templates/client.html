<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PosterDash Client</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="client-body">

    <div id="waitingScreen" class="waiting-screen">
        <div class="waiting-card">
            <h1>Waiting for Posters</h1>
            <p>Open the control panel on:</p>
            <p class="waiting-ip">http://{{ local_ip }}:5005/admin</p>
            <p class="waiting-subtle">Posters will appear automatically</p>
        </div>
    </div>

    <div id="clientPosterWrap" class="client-poster-wrap hidden">
        <div id="clientGlow" class="poster-glow"></div>

        <div class="poster-frame poster-frame-full">
            <img id="clientPoster" class="client-poster client-poster-full" src="" alt="">
            <div id="nowPlayingInside" class="now-playing-inside hidden"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/client.js') }}"></script>
</body>
</html>
